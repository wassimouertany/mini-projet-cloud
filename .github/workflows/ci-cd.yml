name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Flask image
        uses: docker/build-push-action@v5
        with:
          context: ./flask-app
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/mini-projet-flask:latest

  test:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create .env file
        run: |
          echo "POSTGRES_DB=tasks" >> .env
          echo "POSTGRES_USER=admin" >> .env
          echo "POSTGRES_PASSWORD=admin" >> .env
          echo "REDIS_HOST=redis" >> .env
          echo "DATABASE_URL=postgresql://admin:admin@db:5432/tasks" >> .env

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for services to be ready
        run: sleep 20

      - name: Test health endpoint
        run: |
          curl -f http://localhost/health

      - name: Test GET tasks
        run: |
          curl -f http://localhost/tasks

      - name: Test POST task
        run: |
          curl -f -X POST http://localhost/tasks \
            -H "Content-Type: application/json" \
            -d '{"title": "Test CI/CD"}'

      - name: Stop services
        run: docker compose down -v